<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Login - Fixest Admin</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#003ea8",
                        "outline-variant": "#c3c6d7",
                        "surface-tint": "#0053db",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary-fixed": "#07006c",
                        "on-primary-container": "#eeefff",
                        "on-background": "#0b1c30",
                        "secondary-container": "#39b8fd",
                        "surface-dim": "#cbdbf5",
                        "on-error": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "background": "#f8f9ff",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#585be6",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#00174b",
                        "on-secondary-container": "#004666",
                        "on-surface-variant": "#434655",
                        "surface-container-low": "#eff4ff",
                        "outline": "#737686",
                        "secondary-fixed": "#c9e6ff",
                        "on-secondary-fixed-variant": "#004c6e",
                        "surface-container-highest": "#d3e4fe",
                        "primary": "#004ac6",
                        "on-tertiary-container": "#f1eeff",
                        "tertiary": "#3e3fcc",
                        "primary-fixed": "#dbe1ff",
                        "surface-container": "#e5eeff",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#89ceff",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "surface": "#f8f9ff",
                        "surface-bright": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "on-surface": "#0b1c30",
                        "tertiary-fixed": "#e1e0ff",
                        "on-secondary-fixed": "#001e2f",
                        "secondary": "#006591",
                        "primary-container": "#2563eb",
                        "primary-fixed-dim": "#b4c5ff",
                        "inverse-surface": "#213145"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "table-row-height": "48px",
                        "container-padding-mobile": "16px",
                        "unit": "4px",
                        "container-padding-desktop": "32px",
                        "sidebar-width": "260px"
                    },
                    "fontFamily": {
                        "display-lg": ["Geist"],
                        "body-lg": ["Geist"],
                        "headline-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "title-md": ["Geist"],
                        "title-lg": ["Geist"],
                        "body-md": ["Geist"],
                        "label-sm": ["Geist"],
                        "label-md": ["Geist"]
                    },
                    "fontSize": {
                        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
                        "headline-lg": ["32px", {"lineHeight": "40px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                        "title-md": ["16px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "title-lg": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "label-sm": ["11px", {"lineHeight": "14px", "letterSpacing": "0.03em", "fontWeight": "600"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-panel {
            background: rgba(248, 249, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.05);
            position: relative;
        }
        .glass-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.8), transparent);
            border-radius: inherit;
        }
        .gradient-bg {
            background: linear-gradient(135deg, #eff4ff 0%, #cbdbf5 100%);
            position: relative;
            overflow: hidden;
        }
        .gradient-bg::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, transparent 60%);
            z-index: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="h-full antialiased text-on-surface gradient-bg flex items-center justify-center p-4">
<!-- Login Container -->
<div class="relative z-10 w-full max-w-md">
<!-- Branding Header -->
<div class="text-center mb-8">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-lowest/60 backdrop-blur-md border border-white/60 shadow-sm mb-4">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">build</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface">Fixest Admin</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Premium Repair Portal</p>
</div>
<!-- Glassmorphic Card -->
<div class="glass-panel rounded-xl p-8 shadow-xl">
<form action="#" class="space-y-6" method="POST">
<!-- Email Input -->
<div>
<label class="block font-label-md text-label-md text-on-surface-variant mb-1.5" for="email">Email Address</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-lowest/50 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 outline-none" id="email" name="email" placeholder="admin@fixest.com" required="" type="email"/>
</div>
</div>
<!-- Password Input -->
<div>
<div class="flex items-center justify-between mb-1.5">
<label class="block font-label-md text-label-md text-on-surface-variant" for="password">Password</label>
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">Forgot Password?</a>
</div>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-container-lowest/50 border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all duration-200 outline-none" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Sign In Button -->
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-title-md text-title-md text-on-primary bg-gradient-to-r from-primary to-primary-container hover:from-primary-container hover:to-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-all duration-300 transform hover:-translate-y-0.5" type="submit">
                    Sign In
                </button>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    New user? 
                    <a class="font-label-md text-label-md text-primary hover:text-primary-container font-semibold transition-colors" href="#">Create an account</a>
</p>
</div>
</div>
</div>
</body></html>
