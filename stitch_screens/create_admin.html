<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fixest - Premium Repair Portal Signup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary-fixed-variant": "#003ea8",
                        "outline-variant": "#c3c6d7",
                        "surface-tint": "#0053db",
                        "error-container": "#ffdad6",
                        "surface-container-high": "#dce9ff",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-fixed-variant": "#2f2ebe",
                        "inverse-on-surface": "#eaf1ff",
                        "on-tertiary-fixed": "#07006c",
                        "on-primary-container": "#eeefff",
                        "on-background": "#0b1c30",
                        "secondary-container": "#39b8fd",
                        "surface-dim": "#cbdbf5",
                        "on-error": "#ffffff",
                        "inverse-primary": "#b4c5ff",
                        "background": "#f8f9ff",
                        "on-error-container": "#93000a",
                        "tertiary-container": "#585be6",
                        "surface-container-lowest": "#ffffff",
                        "surface-variant": "#d3e4fe",
                        "on-secondary": "#ffffff",
                        "on-primary-fixed": "#00174b",
                        "on-secondary-container": "#004666",
                        "on-surface-variant": "#434655",
                        "surface-container-low": "#eff4ff",
                        "outline": "#737686",
                        "secondary-fixed": "#c9e6ff",
                        "on-secondary-fixed-variant": "#004c6e",
                        "surface-container-highest": "#d3e4fe",
                        "primary": "#004ac6",
                        "on-tertiary-container": "#f1eeff",
                        "tertiary": "#3e3fcc",
                        "primary-fixed": "#dbe1ff",
                        "surface-container": "#e5eeff",
                        "error": "#ba1a1a",
                        "secondary-fixed-dim": "#89ceff",
                        "tertiary-fixed-dim": "#c0c1ff",
                        "surface": "#f8f9ff",
                        "surface-bright": "#f8f9ff",
                        "on-primary": "#ffffff",
                        "on-surface": "#0b1c30",
                        "tertiary-fixed": "#e1e0ff",
                        "on-secondary-fixed": "#001e2f",
                        "secondary": "#006591",
                        "primary-container": "#2563eb",
                        "primary-fixed-dim": "#b4c5ff",
                        "inverse-surface": "#213145"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "gutter": "24px",
                        "table-row-height": "48px",
                        "container-padding-mobile": "16px",
                        "unit": "4px",
                        "container-padding-desktop": "32px",
                        "sidebar-width": "260px"
                    },
                    "fontFamily": {
                        "display-lg": ["Geist"],
                        "body-lg": ["Geist"],
                        "headline-md": ["Geist"],
                        "headline-lg": ["Geist"],
                        "title-md": ["Geist"],
                        "title-lg": ["Geist"],
                        "body-md": ["Geist"],
                        "label-sm": ["Geist"],
                        "label-md": ["Geist"]
                    },
                    "fontSize": {

                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],

                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.01em", "fontWeight": "500"}]

                }
            }

<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.8);
            border-left: 1px solid rgba(255, 255, 255, 0.4);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
        }
        .bg-gradient-mesh {
            background-image: 
                radial-gradient(at 0% 0%, rgba(219, 225, 255, 0.8) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(239, 244, 255, 0.8) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(180, 197, 255, 0.6) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(203, 219, 245, 0.8) 0px, transparent 50%);
            background-color: #f8f9ff;
        }
        .input-glass {
            background: transparent;
            border: 1px solid #c3c6d7;
            transition: all 0.2s ease;
        }
        .input-glass:focus {
            border-color: #004ac6;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.2);
            outline: none;
        }
    </style>
</head>
<body class="h-full bg-gradient-mesh flex items-center justify-center p-4 text-on-surface antialiased font-body-md">
<!-- Note: TopNavBar and SideNavBar are suppressed because this is a transactional Signup page -->
<main class="w-full max-w-[440px] relative z-10">
<!-- Logo Area -->
<div class="text-center mb-8 flex flex-col items-center justify-center gap-2">
<div class="w-12 h-12 bg-primary rounded-xl flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-white" style="font-variation-settings: 'FILL' 1;">build</span>
</div>
<h1 class="font-headline-lg text-headline-lg font-bold text-primary tracking-tight mt-2">Fixest</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Premium Repair Portal</p>
</div>
<!-- Glassmorphic Signup Card -->
<div class="glass-panel rounded-[24px] p-8">
<div class="mb-8">
<h2 class="font-title-lg text-title-lg text-on-surface">Create an Account</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">Enter your details to get started.</p>
</div>
<form action="#" class="space-y-5" method="POST">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="fullName">Full Name</label>
<input class="input-glass w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="fullName" name="fullName" placeholder="John Doe" required="" type="text"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="email">Email Address</label>
<input autocomplete="email" class="input-glass w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="email" name="email" placeholder="john@example.com" required="" type="email"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="password">Password</label>
<input autocomplete="new-password" class="input-glass w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-1" for="confirmPassword">Confirm Password</label>
<input autocomplete="new-password" class="input-glass w-full rounded-lg px-4 py-3 font-body-md text-body-md text-on-surface placeholder:text-outline-variant" id="confirmPassword" name="confirmPassword" placeholder="••••••••" required="" type="password"/>
</div>
<div class="pt-2">
<button class="w-full flex justify-center py-3 px-4 rounded-lg font-title-md text-title-md text-white bg-gradient-to-r from-primary to-secondary hover:shadow-[0_0_15px_rgba(37,99,235,0.3)] transition-all duration-200" type="submit">
                        Create Account
                    </button>
</div>
</form>
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant">
                    Already have an account? 
                    <a class="font-title-md text-title-md text-primary hover:text-surface-tint transition-colors" href="#">Sign In</a>
</p>
</div>
</div>
<!-- Decorative Elements behind card -->
<div class="absolute -top-10 -right-10 w-32 h-32 bg-primary/10 rounded-full blur-2xl -z-10 pointer-events-none"></div>
<div class="absolute -bottom-10 -left-10 w-40 h-40 bg-secondary/10 rounded-full blur-2xl -z-10 pointer-events-none"></div>
</main>
</body></html>
